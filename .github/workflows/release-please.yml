name: 🚀 Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: 🚀 Create Release
    runs-on: arc-linux
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🚀 Release Please
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
