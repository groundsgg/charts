# Default values for grounds-service
# This chart supports a single deployment and optional service.

## @section Global configuration options
##
global:
  ## @param commonLabels Labels to add to all deployed objects
  ##
  commonLabels: {}
  ## @param commonAnnotations Annotations to add to all deployed objects
  ##
  commonAnnotations: {}

## @section Deployment configuration
deployment:
  ## @param deployment.enabled Enable deployment
  enabled: true
  ## @param deployment.replicaCount Number of pods to deploy
  replicaCount: 1
  image:
    ## @param deployment.image.registry Docker image registry (optional)
    registry: ""
    ## @param deployment.image.repository Docker image repository
    repository: "grounds-service"
    ## @param deployment.image.tag Docker image tag
    tag: "latest"
    ## @param deployment.image.pullPolicy Docker image pull policy
    pullPolicy: IfNotPresent
  ## @param deployment.containerPort Container port (optional)
  containerPort: null
  ## @param deployment.containerPortName Container port name (optional)
  containerPortName: http
  ## @param deployment.resources CPU and memory resource requests and limits
  resources: {}
  # Example:
  # resources:
  #   requests:
  #     cpu: "100m"
  #     memory: "128Mi"
  #   limits:
  #     cpu: "500m"
  #     memory: "512Mi"
  ## @param deployment.env Environment variables for the container
  env: {}
  # Example:
  # env:
  #   - name: ENV_VAR_NAME
  #     value: "value"

## @section Service configuration
service:
  ## @param service.enabled Enable service
  enabled: false
  ## @param service.type Kubernetes service type
  type: ClusterIP
  ## @param service.port Service port
  port: 9000
  ## @param service.targetPort Service target port
  targetPort: 9000
  ## @param service.name Service port name
  name: http

## @section ServiceAccount configuration
## A dedicated ServiceAccount is required for NATS auth-callout (B4): the
## broker resolves the connecting pod's SA and reads its gg.grounds/events
## annotation to scope pub/sub. grounds-forge sets these values from the
## workload's events: declarations; defaults are inert (no SA created).
## @section RBAC
##
## A namespaced Role + RoleBinding for the pod's ServiceAccount. Off by default:
## most services only talk to Postgres and NATS and have no business reading the
## Kubernetes API at all.
##
## Needed by service-match, which allocates Agones GameServers in its own
## namespace. Keep the rules as tight as the service actually needs — this binds
## to a Role, not a ClusterRole, so it cannot reach beyond this namespace.
##
## Example:
##   rbac:
##     create: true
##     rules:
##       - apiGroups: ["allocation.agones.dev"]
##         resources: ["gameserverallocations"]
##         verbs: ["create"]
rbac:
  ## @param rbac.create Create a Role + RoleBinding for the ServiceAccount
  create: false
  ## @param rbac.rules Policy rules for the Role
  rules: []

serviceAccount:
  ## @param serviceAccount.create Create a dedicated ServiceAccount for the pod
  create: false
  ## @param serviceAccount.name ServiceAccount name (defaults to the release name)
  name: ""
  ## @param serviceAccount.annotations Annotations on the ServiceAccount (e.g. gg.grounds/events)
  annotations: {}

## @section Grounds projected SA-token (NATS bearer)
## When enabled, projects a short-lived SA-token (audience grounds-services)
## and exposes its path as GROUNDS_TOKEN_FILE so the workload can present it
## as the NATS bearer. Inert by default.
groundsToken:
  ## @param groundsToken.enabled Project the grounds-services SA-token into the pod
  enabled: false
  ## @param groundsToken.audience Token audience the NATS responder validates
  audience: grounds-services
  ## @param groundsToken.mountPath Directory the projected token is mounted at
  mountPath: /var/run/secrets/grounds
  ## @param groundsToken.expirationSeconds Requested token TTL (kubelet rotates)
  expirationSeconds: 3600
