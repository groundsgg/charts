{{- $serverPlatform := default .Values.serverType .Values.serverPlatform -}}
{{- $serverRole := default .Values.serverType .Values.serverRole -}}
apiVersion: agones.dev/v1
kind: Fleet
metadata:
  name: {{ .Release.Name }}
  labels:
    grounds/server-type: {{ $serverRole | quote }}
spec:
  replicas: {{ .Values.replicas }}
  template:
    metadata:
      labels:
        grounds/server-type: {{ $serverRole | quote }}
    spec:
      container: {{ .Release.Name }}
      sdkServer:
        logLevel: Info
        httpPort: 9358
      health:
        disabled: true
      template:
        metadata:
          labels:
            grounds/server-type: {{ $serverRole | quote }}
        spec:
          {{- if eq $serverPlatform "velocity" }}
          serviceAccountName: velocity
          {{- end }}
          containers:
            - name: {{ .Release.Name }}
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              {{- with .Values.command }}
              command:
                {{ toYaml . | nindent 16 }}
              {{- end }}
              env:
                {{- if eq $serverPlatform "velocity" }}
                - name: VELOCITY_FORWARDING_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: velocity-forwarding-secret
                      key: secret
                {{- end }}
                {{- if eq $serverPlatform "paper" }}
                - name: PAPER_VELOCITY_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: velocity-forwarding-secret
                      key: secret
                {{- end }}
              ports:
                - name: http
                  containerPort: 25565
                  protocol: TCP
