apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
    grounds/component: velocity
    {{- with .Values.global.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.global.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "common.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.podLabels" . | nindent 8 }}
        grounds/component: velocity
        {{- with .Values.global.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.global.commonAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default .Release.Name }}
      {{- end }}
      {{- $imageRepo := .Values.image.repository }}
      {{- if .Values.image.registry }}
      {{- $imageRepo = printf "%s/%s" .Values.image.registry .Values.image.repository }}
      {{- end }}
      {{- with .Values.plugins }}
      initContainers:
        {{- /* The plugins emptyDir is mounted over /app/plugins, hiding the JARs
             baked into the velocity image (plugin-agones-velocity,
             plugin-grounds-runtime, plugin-grounds-platform). Seed the volume
             from the image before the per-plugin fetches so the proxy keeps its
             discovery + platform plugins alongside the fetched ones. */}}
        - name: copy-baked-plugins
          image: "{{ $imageRepo }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command:
            - sh
            - -c
            {{/* -r, not -a: the velocity image runs as a non-root user and the
                 emptyDir root is owned by root, so preserving timestamps on the
                 destination directory fails with EPERM and the pod never inits. */}}
            - cp -r /app/plugins/. /plugins/
          volumeMounts:
            - name: plugins
              mountPath: /plugins
        {{- range $plugin := . }}
        - name: fetch-{{ $plugin }}
          image: {{ $.Values.fetcher.image | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - >-
              curl --fail --silent --show-error
              --max-time {{ $.Values.fetcher.timeoutSeconds }}
              --retry 5 --retry-delay 2 --retry-connrefused
              -o /plugins/{{ $plugin }}.jar
              http://{{ $plugin }}:8080/plugin.jar
          volumeMounts:
            - name: plugins
              mountPath: /plugins
        {{- end }}
      {{- end }}
      containers:
        - name: velocity
          image: "{{ $imageRepo }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: minecraft
              containerPort: {{ .Values.ports.minecraft }}
              protocol: TCP
          env:
            - name: VELOCITY_FORWARDING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.forwardingSecret.name }}
                  key: {{ .Values.forwardingSecret.key }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.groundsToken.enabled }}
            - name: GROUNDS_TOKEN_FILE
              value: {{ printf "%s/token" .Values.groundsToken.mountPath | quote }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- with .Values.plugins }}
            # Only mount the init-container emptyDir over /app/plugins when
            # extra plugins are configured. With none (the default), the mount
            # is omitted and the image's BAKED plugins (plugin-grounds-runtime /
            # plugin-grounds-platform / plugin-agones-velocity) are used as-is.
            # When it IS mounted, copy-baked-plugins seeds it from the image
            # first — otherwise the volume hides the baked JARs and velocity
            # loses routing/discovery (unreachable backends).
            - name: plugins
              mountPath: /app/plugins
            {{- end }}
            {{- if .Values.groundsToken.enabled }}
            - name: grounds-sa-token
              mountPath: {{ .Values.groundsToken.mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        {{- with .Values.plugins }}
        - name: plugins
          emptyDir: {}
        {{- end }}
        {{- if .Values.groundsToken.enabled }}
        - name: grounds-sa-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: {{ .Values.groundsToken.audience }}
                  expirationSeconds: {{ .Values.groundsToken.expirationSeconds }}
                  path: token
        {{- end }}
