# Default values for grounds-velocity.
#
# Per-engineer Velocity proxy. Each plugin in `.plugins[]` corresponds
# to a sibling `plugin-velocity-jar` Helm release in the same namespace
# whose Service serves the JAR over HTTP at /plugin.jar. At pod start
# Velocity runs one init-container per entry to fetch each JAR into the
# emptyDir mounted at /app/plugins.

global:
  commonLabels: {}
  commonAnnotations: {}

replicas: 1

image:
  registry: "ghcr.io"
  repository: "groundsgg/velocity"
  tag: "latest"
  pullPolicy: IfNotPresent

# Each entry is the Helm release name of a sibling plugin-velocity-jar
# release. Velocity fetches `http://<name>:8080/plugin.jar` and writes
# it to `/app/plugins/<name>.jar`. Order is preserved.
plugins: []
# Example:
#   plugins:
#     - plugin-social
#     - plugin-chat

# Image used for the per-plugin fetch init-containers.
fetcher:
  image: "curlimages/curl:8.18.0"
  timeoutSeconds: 60

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2"
    memory: "2Gi"

# Velocity exposes the player port (modern Minecraft proxy) and an
# optional metrics port via the velocity-prometheus-exporter plugin.
ports:
  # Match the velocity image's baked velocity.toml bind (0.0.0.0:25565). The
  # chart does not template velocity.toml, so the container binds 25565
  # regardless — the Service/probe/targetPort must agree or health + routing fail.
  minecraft: 25565

service:
  type: ClusterIP
  externalTrafficPolicy: ""

# velocity-forwarding-secret is provisioned out-of-band (Pulumi/sealed
# secret) so all proxies + game-servers in the namespace share one
# secret. The chart only references it.
forwardingSecret:
  name: "velocity-forwarding-secret"
  key: "secret"

env: []

# ServiceAccount for NATS auth-callout (B4): the broker resolves this pod's
# SA and reads its gg.grounds/events annotation to scope the in-process
# plugins' pub/sub. grounds-forge sets these from the bundle component's
# events: declarations; defaults are inert.
serviceAccount:
  create: false
  name: ""
  annotations: {}
  # Pull secrets attached to the ServiceAccount. Needed whenever the image is
  # not public AND this chart creates its own account: a cluster-wide pull
  # secret normally hangs on the namespace's `default` account, and a pod
  # running as any other account does not inherit it. The failure is an
  # ImagePullBackOff that says nothing about ServiceAccounts.
  imagePullSecrets: []

# Grounds projected SA-token (NATS bearer). When enabled, projects a
# short-lived token (audience grounds-services) and exposes GROUNDS_TOKEN_FILE
# so the plugins present it as the NATS bearer. Inert by default.
groundsToken:
  enabled: false
  audience: grounds-services
  mountPath: /var/run/secrets/grounds
  expirationSeconds: 3600
