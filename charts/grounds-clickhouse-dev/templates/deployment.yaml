apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grounds-clickhouse-dev.fullname" . }}
  labels: { app: {{ include "grounds-clickhouse-dev.fullname" . }} }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: {{ include "grounds-clickhouse-dev.fullname" . }} } }
  template:
    metadata: { labels: { app: {{ include "grounds-clickhouse-dev.fullname" . }} } }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: clickhouse
          image: {{ .Values.image }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            capabilities: { drop: ["ALL"] }
          ports:
            - { containerPort: 9000, name: native }
            - { containerPort: 8123, name: http }
          readinessProbe:
            httpGet: { path: /ping, port: 8123 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{ toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - { name: data, mountPath: /var/lib/clickhouse }
            - { name: config, mountPath: /etc/clickhouse-server/config.d/00-memory.xml, subPath: 00-memory.xml, readOnly: true }
            - { name: config, mountPath: /docker-entrypoint-initdb.d/init.sql, subPath: init.sql, readOnly: true }
      volumes:
        - name: config
          configMap: { name: {{ include "grounds-clickhouse-dev.fullname" . }}-config }
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim: { claimName: {{ include "grounds-clickhouse-dev.fullname" . }} }
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "grounds-clickhouse-dev.fullname" . }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: {{ .Values.persistence.size }} } }
  {{- with .Values.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
