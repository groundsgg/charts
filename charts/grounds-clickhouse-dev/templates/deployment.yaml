apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grounds-clickhouse-dev.fullname" . }}
  labels: { app: {{ include "grounds-clickhouse-dev.fullname" . }} }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: {{ include "grounds-clickhouse-dev.fullname" . }} } }
  template:
    metadata: { labels: { app: {{ include "grounds-clickhouse-dev.fullname" . }} } }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: clickhouse
          image: {{ .Values.image }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            capabilities: { drop: ["ALL"] }
          ports:
            - { containerPort: 9000, name: native }
            - { containerPort: 8123, name: http }
          # Readiness reflects actual function, not just an open port. The native
          # NATS-engine table `nats_in` is created at first-boot init and ONLY if
          # the broker accepted the token (its CREATE connects eagerly). If a
          # failed first-boot — bad/expired token or an unreachable broker — left
          # the data dir partially initialised, the official image skips init on
          # the next in-pod restart: the server comes up and /ping passes, but
          # ingestion is silently dead. Gating readiness on `nats_in` surfaces
          # that as NotReady instead of a falsely-healthy pod. Recover by deleting
          # the pod (a fresh emptyDir re-runs init against a now-valid broker).
          readinessProbe:
            exec:
              command:
                - clickhouse-client
                - --query
                - "SELECT throwIf(count() = 0) FROM system.tables WHERE database = 'analytics' AND name = 'nats_in'"
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources: {{ toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - { name: data, mountPath: /var/lib/clickhouse }
            - { name: config, mountPath: /etc/clickhouse-server/config.d/00-memory.xml, subPath: 00-memory.xml, readOnly: true }
            - { name: config, mountPath: /docker-entrypoint-initdb.d/init.sql, subPath: init.sql, readOnly: true }
      volumes:
        - name: config
          configMap: { name: {{ include "grounds-clickhouse-dev.fullname" . }}-config }
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim: { claimName: {{ include "grounds-clickhouse-dev.fullname" . }} }
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "grounds-clickhouse-dev.fullname" . }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: {{ .Values.persistence.size }} } }
  {{- with .Values.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
