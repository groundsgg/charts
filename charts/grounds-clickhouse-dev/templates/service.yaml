apiVersion: v1
kind: Service
metadata:
  name: {{ include "grounds-clickhouse-dev.fullname" . }}
  labels: { app: {{ include "grounds-clickhouse-dev.fullname" . }} }
spec:
  type: ClusterIP
  selector: { app: {{ include "grounds-clickhouse-dev.fullname" . }} }
  ports:
    - { name: native, port: 9000, targetPort: 9000 }
    - { name: http, port: 8123, targetPort: 8123 }
