apiVersion: v2
name: grounds-clickhouse-dev
description: >
  Dev-only throwaway ClickHouse for a per-developer vCluster — the analytics +
  match-history store for the one gamemode running in that vCluster. Mirrors
  grounds-postgres-dev: a plain single-instance Deployment (no operator), fixed
  dev config, ephemeral by default (emptyDir), tiny footprint. It ingests
  directly from the in-vCluster NATS via ClickHouse's native NATS engine — no
  writer service — and the vCluster boundary IS the tenant boundary (one project
  per instance, so no row policies / RBAC). Data dies with the vCluster, which
  is correct for ephemeral test systems.
type: application
version: 0.2.1
appVersion: "24.8"
