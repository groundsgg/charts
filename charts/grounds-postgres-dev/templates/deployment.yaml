apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grounds-postgres-dev.fullname" . }}
  labels: { app: {{ include "grounds-postgres-dev.fullname" . }} }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: {{ include "grounds-postgres-dev.fullname" . }} } }
  template:
    metadata: { labels: { app: {{ include "grounds-postgres-dev.fullname" . }} } }
    spec:
      containers:
        - name: postgres
          image: {{ .Values.image }}
          env:
            - { name: POSTGRES_DB, value: "{{ .Values.db.name }}" }
            - { name: POSTGRES_USER, value: "{{ .Values.db.user }}" }
            - { name: POSTGRES_PASSWORD, value: "{{ .Values.db.password }}" }
            # Keep PGDATA in a subdir so a mounted volume's lost+found doesn't
            # trip the official image's "directory not empty" init check.
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports: [{ containerPort: 5432, name: postgres }]
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "{{ .Values.db.user }}", "-d", "{{ .Values.db.name }}"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources: {{ toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim: { claimName: {{ include "grounds-postgres-dev.fullname" . }} }
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "grounds-postgres-dev.fullname" . }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: {{ .Values.persistence.size }} } }
  {{- with .Values.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
