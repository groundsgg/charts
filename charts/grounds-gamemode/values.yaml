# Default values for grounds-gamemode.
#
# A grounds-gamemode release is one Minecraft game-server kind. The
# chart picks between two backings:
#   - `agones.enabled: true`  → Agones Fleet (autoscaled, dynamic ports)
#   - `agones.enabled: false` → Deployment + Service (fixed port 25565)
#
# Used in the platform-test environment for both:
#   - minestom-lobby      (kind: lobby,    Deployment, single replica)
#   - paper-game          (kind: paper,    Agones Fleet, scales 0..N)
#
# Two independent things, which `kind` alone used to conflate:
#
#   engine — which server binary, and therefore which forwarding env-vars it
#            reads. `minestom` gets GROUNDS_PROXY_MODE +
#            GROUNDS_VELOCITY_FORWARDING_SECRET, `paper` gets
#            PAPER_VELOCITY_SECRET.
#
#   kind   — what role it plays. It becomes the `grounds/server-type` label,
#            which is how Velocity's plugin-agones decides what to discover and
#            which of those are lobbies (its lobby value is literally "lobby").
#
# They were the same field, so a Minestom *game* had no correct value: `game`
# handed it Paper's variable, and `lobby` gave it the right variables but told
# Velocity to send players straight to it.
#
# Leave `engine` empty to keep the old behaviour — it is then inferred as
# minestom for kind=lobby and paper for everything else, which is exactly what
# the single field used to do.
engine: ""

global:
  commonLabels: {}
  commonAnnotations: {}

# Logical kind of the game-server. See note above.
kind: "paper"

image:
  registry: "ghcr.io"
  repository: "groundsgg/paper-game"
  tag: "latest"
  pullPolicy: IfNotPresent

# Agones Fleet mode — set agones.enabled=true to switch from Deployment
# to a Fleet. Bundle.yaml's `helm.agones.fleet` map maps directly here.
#
# Without `autoscaler.enabled`, `minReplicas` is the Fleet's fixed
# `.spec.replicas` and `maxReplicas` does nothing at all — a Fleet of 1 whose
# only server gets allocated leaves the next player with nowhere to go, and
# nothing grows it back.
#
# With it, a Buffer-policy FleetAutoscaler keeps `bufferSize` servers *ready*
# on top of whatever is allocated, between min and max. `minReplicas` then
# becomes the floor rather than the count.
agones:
  enabled: false
  fleet:
    minReplicas: 0
    maxReplicas: 2
    autoscaler:
      # Off by default: turning this on for every existing release would start
      # changing replica counts on fleets nobody asked to autoscale.
      enabled: false
      # Servers kept ready beyond those allocated. An absolute count, so it
      # must not exceed maxReplicas; Agones also requires minReplicas to be at
      # least this when minReplicas is non-zero.
      bufferSize: 2
      # How often Agones re-evaluates. The default 30s is a long time to wait
      # for a lobby when the buffer just emptied.
      syncSeconds: 15

# Deployment-mode config (ignored when agones.enabled).
replicas: 1

# velocity-forwarding-secret is provisioned out-of-band; the chart
# only references it. Same convention as grounds-velocity.
forwardingSecret:
  name: "velocity-forwarding-secret"
  key: "secret"

# Container port. Minecraft default 25565.
containerPort: 25565

# Optional entrypoint override. This REPLACES the image's ENTRYPOINT — it does
# not add to it. Every image these charts run is `ENTRYPOINT ["java","-jar",…]`,
# so passing a flag here (`command: ["--port","25565"]`) makes the runtime try
# to exec `--port` as the binary and the container dies before it starts:
#   exec: "--port": executable file not found in $PATH
# Use `args` below for flags; reach for this only to run a different binary.
command: []

# Arguments appended to the image's ENTRYPOINT. This is what flags belong in —
# `args: ["--port","25565"]` reaches the jar as an argument, which is almost
# always the intent.
args: []

# extraEnv merges into env after the kind-specific velocity-secret.
extraEnv: []

resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    cpu: "2"
    memory: "4Gi"

service:
  type: ClusterIP
