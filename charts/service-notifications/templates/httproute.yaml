{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "service-notifications.fullname" . }}
  labels:
    {{- include "service-notifications.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ required "gateway.parentRef.name is required" .Values.gateway.parentRef.name }}
      {{- with .Values.gateway.parentRef.namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .Values.gateway.parentRef.sectionName }}
      sectionName: {{ . }}
      {{- end }}
  hostnames:
    - {{ required "gateway.hostname is required" .Values.gateway.hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ include "service-notifications.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
