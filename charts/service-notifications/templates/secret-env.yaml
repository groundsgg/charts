{{/*
Environment variables sourced from Kubernetes Secrets.
*/}}
{{- define "service-notifications.secretEnv" -}}
- name: QUARKUS_DATASOURCE_JDBC_URL
  valueFrom:
    secretKeyRef:
      name: {{ include "service-notifications.databaseSecretName" . | quote }}
      key: {{ required "database.jdbcUrlSecretKey is required" .Values.database.jdbcUrlSecretKey | quote }}
- name: QUARKUS_DATASOURCE_USERNAME
  valueFrom:
    secretKeyRef:
      name: {{ include "service-notifications.databaseSecretName" . | quote }}
      key: {{ required "database.usernameSecretKey is required" .Values.database.usernameSecretKey | quote }}
- name: QUARKUS_DATASOURCE_PASSWORD
  valueFrom:
    secretKeyRef:
      name: {{ include "service-notifications.databaseSecretName" . | quote }}
      key: {{ required "database.passwordSecretKey is required" .Values.database.passwordSecretKey | quote }}
- name: FORGE_INTERNAL_TOKEN
  valueFrom:
    secretKeyRef:
      name: {{ include "service-notifications.existingSecretName" . | quote }}
      key: FORGE_INTERNAL_TOKEN
- name: NOTIFICATIONS_FORGE_INTERNAL_TOKEN
  valueFrom:
    secretKeyRef:
      name: {{ include "service-notifications.existingSecretName" . | quote }}
      key: FORGE_INTERNAL_TOKEN
- name: CHANNEL_TOKEN_PEPPER
  valueFrom:
    secretKeyRef:
      name: {{ include "service-notifications.existingSecretName" . | quote }}
      key: CHANNEL_TOKEN_PEPPER
{{- end }}
