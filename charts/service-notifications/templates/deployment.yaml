apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "service-notifications.fullname" . }}
  labels:
    {{- include "service-notifications.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "service-notifications.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "service-notifications.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "service-notifications.fullname" .) }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: service-notifications
          image: "{{ required "image.repository is required" .Values.image.repository }}:{{ required "image.tag is required" .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: NOTIFICATIONS_PUBLIC_URL
              value: {{ required "config.publicUrl is required" .Values.config.publicUrl | quote }}
            - name: KEYCLOAK_ISSUER_URL
              value: {{ required "config.keycloakIssuerUrl is required" .Values.config.keycloakIssuerUrl | quote }}
            - name: NOTIFICATIONS_JWT_ISSUER
              value: {{ required "config.keycloakIssuerUrl is required" .Values.config.keycloakIssuerUrl | quote }}
            - name: NOTIFICATIONS_JWT_PUBLIC_KEY_LOCATION
              value: {{ required "config.jwtPublicKeyLocation is required" .Values.config.jwtPublicKeyLocation | quote }}
            - name: FORGE_BASE_URL
              value: {{ required "config.forgeBaseUrl is required" .Values.config.forgeBaseUrl | quote }}
            - name: NOTIFICATIONS_FORGE_BASE_URL
              value: {{ required "config.forgeBaseUrl is required" .Values.config.forgeBaseUrl | quote }}
            {{- if .Values.nats.url }}
            - name: NATS_URL
              value: {{ .Values.nats.url | quote }}
            {{- end }}
            {{- if .Values.nats.token.value }}
            - name: NATS_TOKEN
              value: {{ .Values.nats.token.value | quote }}
            {{- else if .Values.nats.token.existingSecret.name }}
            - name: NATS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.nats.token.existingSecret.name | quote }}
                  key: {{ .Values.nats.token.existingSecret.key | quote }}
            {{- end }}
            {{- if .Values.nats.tokenFile.enabled }}
            - name: NATS_TOKEN_FILE
              value: {{ .Values.nats.tokenFile.path | default (printf "%s/token" .Values.groundsToken.mountPath) | quote }}
            {{- end }}
            {{- include "service-notifications.secretEnv" . | nindent 12 }}
          {{- if .Values.groundsToken.enabled }}
          volumeMounts:
            - name: grounds-sa-token
              mountPath: {{ .Values.groundsToken.mountPath | quote }}
              readOnly: true
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      {{- if .Values.groundsToken.enabled }}
      volumes:
        - name: grounds-sa-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: {{ .Values.groundsToken.audience | quote }}
                  expirationSeconds: {{ .Values.groundsToken.expirationSeconds }}
                  path: token
      {{- end }}
