image:
  repository: ghcr.io/groundsgg/service-notifications
  tag: "0.2.0"
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  port: 8080

config:
  publicUrl: "https://notifications.grounds.gg"
  keycloakIssuerUrl: "https://account.grounds.gg/realms/grounds"
  jwtPublicKeyLocation: "https://account.grounds.gg/realms/grounds/protocol/openid-connect/certs"
  forgeBaseUrl: "http://grounds-forge.grounds-forge.svc.cluster.local:8080"

existingSecret:
  name: "service-notifications"

database:
  jdbcUrlSecretName: "notifications-db-app"
  jdbcUrlSecretKey: "jdbc-uri"
  usernameSecretKey: "username"
  passwordSecretKey: "password"

gateway:
  enabled: true
  hostname: "notifications.grounds.gg"
  parentRef:
    name: "grounds-gateway"
    namespace: "gateway-system"
    sectionName: "https-public"

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

livenessProbe:
  httpGet:
    path: /q/health/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /q/health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

serviceMonitor:
  enabled: false
  path: /q/metrics
  interval: 30s
  scrapeTimeout: 10s
