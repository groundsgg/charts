# Default values for Novu.

global:
  commonLabels: {}
  commonAnnotations: {}

novu:
  existingSecret:
    name: ""

  public:
    apiUrl: "http://localhost:3000"
    webUrl: "http://localhost:4200"
    wsUrl: "ws://localhost:3002"
    widgetEmbedPath: "http://localhost:4701/embed.umd.min.js"

  config:
    nodeEnv: "production"
    disableUserRegistration: "true"
    storageService: "local"

  mongodb:
    # Stored in a generated Secret as MONGO_URL because MongoDB URIs commonly
    # contain credentials. If set, provide an already percent-encoded URI.
    externalUri: ""

  redis:
    externalHost: ""
    externalPort: 6379

  secrets:
    novuSecretKey: ""
    jwtSecret: ""
    storeEncryptionKey: ""
    awsAccessKeyId: ""
    awsSecretAccessKey: ""
    redisPassword: ""

components:
  api:
    enabled: true
    replicaCount: 1
    image:
      repository: "ghcr.io/novuhq/novu/api"
      tag: ""
      pullPolicy: IfNotPresent
    command: []
    args: []
    containerPort: 3000
    service:
      enabled: true
      type: ClusterIP
      port: 3000
    resources: {}
    env: []

  worker:
    enabled: true
    replicaCount: 1
    image:
      repository: "ghcr.io/novuhq/novu/worker"
      tag: ""
      pullPolicy: IfNotPresent
    command: []
    args: []
    containerPort: null
    service:
      enabled: false
      type: ClusterIP
      port: 3000
    resources: {}
    env: []

  ws:
    enabled: true
    replicaCount: 1
    image:
      repository: "ghcr.io/novuhq/novu/ws"
      tag: ""
      pullPolicy: IfNotPresent
    command: []
    args: []
    containerPort: 3002
    service:
      enabled: true
      type: ClusterIP
      port: 3002
    resources: {}
    env: []

  web:
    enabled: true
    replicaCount: 1
    image:
      repository: "ghcr.io/novuhq/novu/web"
      tag: ""
      pullPolicy: IfNotPresent
    command:
      - /bin/sh
      - -c
    args:
      - pnpm run envsetup:docker && pnpm run start:static:build
    containerPort: 4200
    service:
      enabled: true
      type: ClusterIP
      port: 4200
    resources: {}
    env: []

redis:
  enabled: true
  dataStorage:
    enabled: true
    requestedSize: 2Gi
  auth:
    enabled: false
    usersExistingSecret: ""
    aclUsers: {}

mongodb:
  enabled: true
  image:
    repository: mongo
    tag: "8.0"
    pullPolicy: IfNotPresent
  auth:
    # The official mongo image only runs /docker-entrypoint-initdb.d scripts
    # when the data directory is empty. Enable auth before first install, or
    # migrate/create users manually before enabling it on an existing PVC.
    enabled: false
    rootPassword: ""
    usernames:
      - novu
    passwords:
      - ""
    databases:
      - novu
  persistence:
    # Disabling persistence uses emptyDir and loses MongoDB data whenever the pod
    # is replaced. Enabling persistence later does not migrate previous emptyDir data.
    enabled: true
    size: 10Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
  resources: {}
