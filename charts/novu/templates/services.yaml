{{- range $component, $componentValues := .Values.components }}
{{- if and $componentValues.enabled $componentValues.service.enabled }}
{{- if not $componentValues.containerPort }}
{{- fail (printf "components.%s.containerPort is required when components.%s.service.enabled is true" $component $component) }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "novu.componentName" (dict "root" $ "component" $component) }}
  labels:
    {{- include "novu.componentLabels" (dict "root" $ "component" $component) | nindent 4 }}
    {{- with $.Values.global.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $.Values.global.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $componentValues.service.type }}
  ports:
    - port: {{ $componentValues.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "novu.componentSelectorLabels" (dict "root" $ "component" $component) | nindent 4 }}
{{- end }}
{{- end }}
