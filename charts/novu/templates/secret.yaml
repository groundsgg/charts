{{- if not .Values.novu.existingSecret.name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "novu.secretName" . }}
  labels:
    {{- include "novu.labels" . | nindent 4 }}
    {{- with .Values.global.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.global.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  NOVU_SECRET_KEY: {{ required "novu.secrets.novuSecretKey is required when novu.existingSecret.name is unset" .Values.novu.secrets.novuSecretKey | b64enc | quote }}
  JWT_SECRET: {{ required "novu.secrets.jwtSecret is required when novu.existingSecret.name is unset" .Values.novu.secrets.jwtSecret | b64enc | quote }}
  STORE_ENCRYPTION_KEY: {{ required "novu.secrets.storeEncryptionKey is required when novu.existingSecret.name is unset" .Values.novu.secrets.storeEncryptionKey | b64enc | quote }}
  AWS_ACCESS_KEY_ID: {{ required "novu.secrets.awsAccessKeyId is required when novu.existingSecret.name is unset" .Values.novu.secrets.awsAccessKeyId | b64enc | quote }}
  AWS_SECRET_ACCESS_KEY: {{ required "novu.secrets.awsSecretAccessKey is required when novu.existingSecret.name is unset" .Values.novu.secrets.awsSecretAccessKey | b64enc | quote }}
  {{- if .Values.redis.auth.enabled }}
  REDIS_PASSWORD: {{ required "novu.secrets.redisPassword is required when redis.auth.enabled is true and novu.existingSecret.name is unset" .Values.novu.secrets.redisPassword | b64enc | quote }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "novu.connectionSecretName" . }}
  labels:
    {{- include "novu.labels" . | nindent 4 }}
    {{- with .Values.global.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.global.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  MONGO_URL: {{ include "novu.mongodbUri" . | b64enc | quote }}
{{- if and .Values.mongodb.enabled .Values.mongodb.auth.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-mongodb
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mongodb
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    {{- with .Values.global.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.global.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  mongodb-root-password: {{ required "mongodb.auth.rootPassword is required when mongodb.auth.enabled is true" .Values.mongodb.auth.rootPassword | b64enc | quote }}
  mongodb-password: {{ required "mongodb.auth.passwords[0] is required when mongodb.auth.enabled is true" (first .Values.mongodb.auth.passwords) | b64enc | quote }}
{{- end }}
