apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "novu.fullname" . }}-config
  labels:
    {{- include "novu.labels" . | nindent 4 }}
    {{- with .Values.global.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.global.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  NODE_ENV: {{ .Values.novu.config.nodeEnv | quote }}
  DISABLE_USER_REGISTRATION: {{ .Values.novu.config.disableUserRegistration | quote }}
  STORAGE_SERVICE: {{ .Values.novu.config.storageService | quote }}
  MONGO_URL: {{ include "novu.mongodbUri" . | quote }}
  REDIS_HOST: {{ include "novu.redisHost" . | quote }}
  REDIS_PORT: {{ .Values.novu.redis.externalPort | quote }}
  API_ROOT_URL: {{ .Values.novu.public.apiUrl | quote }}
  FRONT_BASE_URL: {{ .Values.novu.public.webUrl | quote }}
  WIDGET_EMBED_PATH: {{ .Values.novu.public.widgetEmbedPath | quote }}
  REACT_APP_API_URL: {{ .Values.novu.public.apiUrl | quote }}
  REACT_APP_ENVIRONMENT: {{ .Values.novu.config.nodeEnv | quote }}
  REACT_APP_WIDGET_EMBED_PATH: {{ .Values.novu.public.widgetEmbedPath | quote }}
  REACT_APP_IS_SELF_HOSTED: "true"
  REACT_APP_WS_URL: {{ .Values.novu.public.wsUrl | quote }}
