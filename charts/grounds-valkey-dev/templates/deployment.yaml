apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grounds-valkey-dev.fullname" . }}
  labels: { app: {{ include "grounds-valkey-dev.fullname" . }} }
spec:
  replicas: 1
  # Recreate, not RollingUpdate: two Valkeys must never serve the same queue at
  # once. Correctness here rests on Valkey serialising the Lua scripts, and a
  # surge pod would break that assumption for the overlap window.
  strategy: { type: Recreate }
  selector: { matchLabels: { app: {{ include "grounds-valkey-dev.fullname" . }} } }
  template:
    metadata: { labels: { app: {{ include "grounds-valkey-dev.fullname" . }} } }
    spec:
      containers:
        - name: valkey
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args:
            - --appendonly
            - {{ .Values.appendonly | ternary "yes" "no" | quote }}
            {{- if .Values.appendonly }}
            - --appendfsync
            - {{ .Values.appendfsync | quote }}
            {{- end }}
            - --dir
            - /data
          ports: [{ containerPort: 6379, name: valkey }]
          readinessProbe:
            exec: { command: ["valkey-cli", "ping"] }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            exec: { command: ["valkey-cli", "ping"] }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources: {{ toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim: { claimName: {{ include "grounds-valkey-dev.fullname" . }} }
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "grounds-valkey-dev.fullname" . }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: {{ .Values.persistence.size }} } }
  {{- with .Values.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
